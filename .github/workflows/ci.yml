name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfdk-aac-dev libopus-dev libavcodec-dev libavutil-dev libswscale-dev libavformat-dev libswresample-dev libopusfile-dev

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./... || true

      - name: Extract coverage percentage
        if: hashFiles('coverage.out') != ''
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"

          # Determine badge color
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR=brightgreen
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR=yellow
          else
            COLOR=red
          fi
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && steps.coverage.outputs.percentage != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: gomedia-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}
